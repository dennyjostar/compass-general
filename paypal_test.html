<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal MCP 테스트 결제</title>
    <style>
        :root {
            --primary: #0070ba;
            --secondary: #1546a1;
            --bg: #f5f7fa;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .paypal-logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #003087;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 800;
            margin: 1.5rem 0;
            color: var(--primary);
        }

        .price-tag span {
            font-size: 1.2rem;
            color: #666;
            font-weight: 400;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 112, 186, 0.3);
        }

        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 112, 186, 0.4);
        }

        .info {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="card">
        <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" alt="PayPal"
            class="paypal-logo">
        <h1>MCP 테스트 결제</h1>
        <p>PayPal MCP 서버 연동 확인을 위한<br>3달러 테스트 결제입니다.</p>

        <div class="price-tag">
            <span>$</span>3.00
        </div>

        <a href="https://www.sandbox.paypal.com/checkoutnow?token=11794064FA348330K" target="_blank" class="btn">
            지금 결제하기
        </a>

        <div class="info">
            Sandbox 모드에서 안전하게 테스트됩니다.
        </div>
    </div>
</body>

</html>
